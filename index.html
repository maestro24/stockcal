    <main class="main">
      <!-- 이번 주 요약 -->
      <section class="week-summary">
        <div class="summary-card" id="card-ipo">
          <div class="summary-head">
            <h2>이번 주 공모주</h2>
            <span class="updated" id="ipo-updated"></span>
          </div>
          <div class="summary-body" id="week-ipo"><div class="empty">불러오는 중…</div></div>
        </div>
        <div class="summary-card" id="card-div">
          <div class="summary-head">
            <h2>이번 주 배당락</h2>
            <span class="updated" id="div-updated"></span>
          </div>
          <div class="summary-body" id="week-div"><div class="empty">불러오는 중…</div></div>
        </div>
      </section>

      <!-- 공모주 캘린더 -->
      <section class="cal-section">
        <div class="cal-toolbar">
          <div class="month-nav">
            <button class="icon-btn" id="btn-prev" aria-label="이전 달">‹</button>
            <h2 id="cal-title">-</h2>
            <button class="icon-btn" id="btn-next" aria-label="다음 달">›</button>
          </div>
          <div class="view-toggle" role="tablist">
            <button class="toggle-btn active" id="btn-view-cal" role="tab">캘린더</button>
            <button class="toggle-btn" id="btn-view-list" role="tab">리스트</button>
          </div>
        </div>
        <div class="legend">
          <span class="lg"><i class="dot dot-open"></i>청약</span>
          <span class="lg"><i class="dot dot-list"></i>상장</span>
          <span class="lg"><i class="dot dot-div"></i>배당락</span>
        </div>
        <div id="view-cal" class="calendar"></div>
        <div id="view-list" class="ipo-list hidden"></div>
      </section>
    </main>
